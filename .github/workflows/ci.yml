name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  package-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create temporary secrets file
        run: |
          cat > secrets.local.json <<'JSON'
          {
            "appInsightsConnectionString": "InstrumentationKey=00000000-0000-0000-0000-000000000000;IngestionEndpoint=https://example.in.applicationinsights.azure.com/;LiveEndpoint=https://example.livediagnostics.monitor.azure.com/;ApplicationId=00000000-0000-0000-0000-000000000000"
          }
          JSON

      - name: Build release zip
        run: bash scripts/package.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: dist/*.zip
